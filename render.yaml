services:
  - type: web
    name: collabdoc-web
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    dockerCommand: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: collabdoc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabdoc-redis
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: CSRF_COOKIE_SECURE
        value: "1"
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: COLLAB_TOKEN_TTL_SECONDS
        value: "600"
      - key: WS_MAX_MESSAGE_BYTES
        value: "1048576"
      - key: WS_MAX_MESSAGES_PER_SECOND
        value: "50"
      - key: WS_MAX_CONNECTIONS_PER_USER_DOC
        value: "5"

  - type: worker
    name: collabdoc-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    dockerCommand: celery -A config worker -l info
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: collabdoc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabdoc-redis
          property: connectionString

  - type: worker
    name: collabdoc-beat
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    dockerCommand: celery -A config beat -l info
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: collabdoc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabdoc-redis
          property: connectionString

  - type: redis
    name: collabdoc-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: collabdoc-db
    plan: starter
    databaseName: collabdoc
    user: collabdoc
